<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemma PDF App</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; }
    header { background: #222; color: white; padding: 15px 20px; }
    main { height: calc(100vh - 60px); }
    iframe { width: 100%; height: 100%; border: none; }
    a { color: white; float: right; }
  </style>
</head>
<body>
  <header>
    Gemma PDF App
    <a href="Gemma.pdf" download>Download PDF</a>
  </header>
  <main>
    <iframe src="Gemma.pdf"></iframe>
  </main>
</body>
</html>
